name: Deploy React App to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        working-directory: react
        run: npm install

      - name: Build React App
        working-directory: react
        run: npm run build

      - name: Deploy to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SERVER_SSH_KEY }}
          source: "react/dist/"
          target: "/srv/pass-gen-ui"
          rm: true
          strip_components: 1

      - name: Set Permissions & Restart Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SERVER_SSH_KEY }}
          script: |
            # Set permissions
            sudo chown -R www-data:www-data /srv/pass-gen-ui
            sudo chmod -R 755 /srv/pass-gen-ui
            
            # Reload nginx
            sudo systemctl reload nginx
            echo "✅ Deployment to /var/www/html completed successfully!"